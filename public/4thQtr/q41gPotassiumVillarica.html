<html>
<head>
    <title>Ianna's Movie Directory!</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <meta name="author" content="Arianna Nina M. Villarica">

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            width: 100%; height: 100%;
            padding: 0; margin: 0;  
            background-color: #24273a;
            color: #cad3f5;
            font-family: "Roboto", sans-serif; 
        }

        #page {
            width: 96vw; 
            margin: 0; 
            padding: 2vw;
            display: flex; 
            gap: 2vw; 
        }

        hr {
            color: #cad3f5;
            opacity: 0.5;
        }

        h2 {
            color: #c6a0f6;
        }

        #movieForm {
            background-color: #1e2030;
            border: none; 
            border-radius: 5px; 
            width: 45%; 
        }

        #mainForm {
            border: none; 
        }

        #rating > input {
            display: none;
        }

        .star {
            font-size: 2vw;
            color: #b8c0e0;
        }

        #submitbtn {
            color: #1e2030; 
            padding: 5px; 
            border-radius: 5px; 
            background-color: #f5a97f;
            border: none; 
        }

        #submitbtn:hover {
            background-color: #b8c0e0;
        }

        #directory {
            margin: 0; 
            padding: 0; 
            width: 80%; 
        }

        #directory > li { 
            background-color: #8aadf4; color: #24273a;
            padding: 5px; margin: 0; 
            border-radius: 5px;
        }

        #nonForm {
            width: 50%; 
            padding: 0; margin: 0; 
        }

        #delete {
            background-color: #ed8796;
            color: #1e2030;
            font-family: "Roboto", sans-serif;
            border: none; border-radius: 5px;
        }
    </style>
</head>

<body onload='update(JSON.parse(localStorage.getItem("savedMovies")))'>
    <div id="page">
    <form id="movieForm">
        <fieldset id="mainForm">
            <h2>Add a Movie</h2>
            <hr>
            <br>
            <label for="title">Title:</label>
            <input type="text" id="title" required>
            <br><br>
            <label for="year">Year:</label>
            <input type="number" id="year" required>
            <br><br>
            <label for="genre">Genre:</label>
            <select id="genre" required>
                <option value="Action">Action</option>
                <option value="Romcom">Romance-Comedy</option>
                <option value="Horror">Horror/Thriller</option>
                <option value="History">Historical</option>
                <option value="Sci-fi">Science Fiction</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Cartoons">Cartoon</option>
                <option value="Anime">Anime</option>
                <option value="Drama">Drama</option>
            </select>
            <br><br>
            Rating:
            <div id="rating">
                <label for="s1"><span class="star">★</span></label>
                <input required name="star" type="radio" id="s1" value="1" class="starRating">

                <label for="s2"><span class="star">★</span></label>
                <input name="star" type="radio" id="s2" value="2" class="starRating">

                <label for="s3"><span class="star">★</span></label>
                <input name="star" type="radio" id="s3" value="3" class="starRating">

                <label for="s4"><span class="star">★</span></label>
                <input name="star" type="radio" id="s4" value="4" class="starRating">
                
                <label for="s5"><span class="star">★</span></label>
                <input name="star" type="radio" id="s5" value="5" class="starRating">
            </div>
            <br>
        <button type="submit" id="submitbtn">Add a Movie</button>
        </fieldset>
    </form>

    <div id="nonForm">
        <h3>Movie List</h3>
        <ul id="directory">
        </ul>
    </div>

    <script>
        var submit = document.getElementById("movieForm");
        var rating = document.getElementById("rating");
        var currMovie = 0; 

        submit.addEventListener("submit", record);
        function record(event) {
            event.preventDefault(); 
            var moviesList = JSON.parse(localStorage.getItem('savedMovies')) || [];

            var titleInp = document.getElementById("title"); 
            var yearInp = document.getElementById("year");
            var genreInp = document.getElementById("genre");
            var starInp = document.querySelector('input[name=star]:checked');
            
            var movie = {
                title: titleInp.value,
                year: yearInp.value,
                genre: genreInp.value,
                rating: starInp.value
            }

            // stores object in array & updates user view
            var screenedList = movieChecker(movie, moviesList);
            update(screenedList);

            titleInp.value = "";
            yearInp.value = ""; 
            genreInp.value = "";
            starInp.value = "";

            var symbols = document.getElementsByClassName("star");
            
            for (let i = 0; i < symbols.length; i++)
                symbols[i].style.color = "#b8c0e0";

            localStorage.setItem('savedMovies', JSON.stringify(moviesList));
            console.log(localStorage.getItem('savedMovies'));
        }

        rating.addEventListener("change", addRating);
        function addRating(){
            // get value from radio button
            var star = Number(document.querySelector('input[name=star]:checked').value);
            
            var symbols = document.getElementsByClassName("star");
            
            for (let i = 0; i < symbols.length; i++)
                symbols[i].style.color = "#b8c0e0";

            //  colors every star yellow until the nth star
            for (let i = star - 1; i >= 0; i--)
            {
                symbols[i].style.color = "#eed49f";
            }
        }

        function update(list){
            var directory = document.getElementById("directory"); 
            directory.innerHTML = "";

            for (let i = 0; i < list.length; i++)
            {
                var strToAdd = "";
                var star = "★"; 

                strToAdd += ` (${list[i].year})`;
                strToAdd += ` - ${list[i].genre}, Rating:`;

                // for sure number of WHOLE stars
                var starMinusOne = Math.ceil(list[i].rating) - 1;

                var actuallyAdd = "";
                actuallyAdd += `<li><b>${list[i].title}</b>${strToAdd} <span style="color:#eed49f; display: inline-block; position:relative;font-size:1vw;">${star.repeat(starMinusOne)}`;

                var leftover = list[i].rating - starMinusOne;
                actuallyAdd += `<span style="width:${leftover}vw;overflow:hidden;text-overflow:clip;white-space:nowrap;position:absolute;">${star}</span>`; 
                // credits to GEMINI, https://www.freecodecamp.org/news/how-to-truncate-text-with-css-javascript/ for guiding me & teaching my how to use these <3 ⬆ 
                actuallyAdd += "</span><br>";

                // DELETE BUTTON 
                actuallyAdd += `<button id='delete' onclick='deleteItem(${i});'>Delete</button>`;
                actuallyAdd += "</li><br>";

                directory.innerHTML += actuallyAdd; 
            }
        }

        function movieChecker(curr, list) {

            var notInList = true; 
            for (let i = 0; i < list.length; i++)
            {
                if ((curr.title == list[i].title))
                {
                    if (list[i].counter < 2)
                        list[i].counter = 2; 
                    else
                        list[i].counter = Number(list[i].counter) + 1; 

                    let counter = Number(list[i].counter);
                    let ogRating = Number(list[i].rating);
                    let newRating = Number(curr.rating);

                    curr.rating = (ogRating*(counter - 1) + newRating) / counter;
                    curr.counter = counter; 
                    console.log(curr);
                    notInList = false; 
                    list[i] = curr; 
                    break; 
                }
            }
            
            if (notInList)
                list.push(curr); 

            return list; 
        }

        function deleteItem(itemNo) {
            var list = JSON.parse(localStorage.getItem('savedMovies'));
            if (confirm("Are you sure you want to delete?")) {
                list.splice(itemNo, 1);
            }
            localStorage.setItem('savedMovies', JSON.stringify(list));
            update(list);
        }
    </script>
</body>
</html>
