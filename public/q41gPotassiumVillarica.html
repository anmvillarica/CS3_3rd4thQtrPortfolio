<html>
<head>

    <style>
        #rating > input {
            width: 0; 
            height: 0; 
        }

        .star:checked {
            color: yellow
        }
    </style>
</head>

<body>
    <form id="movieForm">
        <fieldset>
            <legend>Add a Movie</legend>
            Title: <input type="text" id="title">
            Year: <input type="number" id="year">
            Genre: 
            <select>
                <option value="action">Action</option>
                <option value="romcom">Romance-Comedy</option>
                <option value="horror">Horror/Thriller</option>
                <option value="history">Historical</option>
                <option value="sci-fi">Science Fiction</option>
                <option value="fantasy">Fantasy</option>
                <option value="cartoons">Cartoon</option>
                <option value="anime">Anime</option>
                <option value="drama">Drama</option>
            </select>
            Rating:
            <fieldset id="rating">
                <input type="radio" id="s1" value="1" for="s1">
                <label name="s1"><span class="star">★</span></label>
                <input type="radio" id="s2" value="2">
                <label name="s2"><span class="star">★</span></label>
                <input type="radio" id="s3" value="3">
                <label name="s3"><span class="star">★</span></label>
                <input type="radio" id="s4" value="4">
                <label name="s4"><span class="star">★</span></label>
                <input type="radio" id="s5" value="5">
                <label name="s5"><span class="star">★</span></label>
            </fieldset>
        </fieldset>
    </form>
</body>
</html>
